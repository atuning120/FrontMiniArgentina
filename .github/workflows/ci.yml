name: Frontend CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  docker-build-push:
    name: Construir y Subir Docker (Front)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Necesario para subir a GHCR

    steps:
      - name: Descargar el código fuente
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar sesión en GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y Subir imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          # push en true SOLO si el código se fusionó en 'main'
          push: ${{ github.event_name == 'push' }}
          # Formato de la URL: ghcr.io/USUARIO/NOMBRE_IMAGEN:TAG
          tags: ghcr.io/${{ github.repository_owner }}/miniecommerce-front:latest
